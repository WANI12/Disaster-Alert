services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: disaster_alert
      MYSQL_USER: disaster
      MYSQL_PASSWORD: disaster_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:

